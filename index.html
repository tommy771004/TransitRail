<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Rail Nation - Global train routes and transit schedules. Find the best transit options worldwide." />
    <meta name="keywords" content="train, transit, routes, schedules, subway, railway, global transit, Rail Nation" />
    <meta name="author" content="Rail Nation" />
    
    <!-- GEO Meta Tags (Defaulting to Taiwan based on app settings, but these are general tags) -->
    <meta name="geo.region" content="TW" />
    <meta name="geo.placename" content="Taipei" />
    <meta name="geo.position" content="25.0330;121.5654" />
    <meta name="ICBM" content="25.0330, 121.5654" />
    
    <title>Rail Nation</title>
    <script>
      (function(){try{var s=localStorage.getItem('transitrail.theme');if(s==='dark'){document.documentElement.classList.add('dark');}else if(!s&&window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.classList.add('dark');}}catch(e){}})();
    </script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
