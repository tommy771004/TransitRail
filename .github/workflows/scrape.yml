name: Daily Transit Data Scrape

on:
  schedule:
    # Run at 22:00 UTC every day = 06:00 Taiwan time (UTC+8)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Start date (YYYY-MM-DD, default: today in Asia/Taipei); scrapes 7 days forward"
        required: false
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run scrapers
        run: npm run scrape -- ${{ github.event.inputs.date }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update transit scraped data [skip ci]"
          file_pattern: "src/data/scraped/*.json src/data/scraped/*/*.json"
          commit_user_name: "TransitRail Scraper Bot"
          commit_user_email: "scraper@transitrail.app"
